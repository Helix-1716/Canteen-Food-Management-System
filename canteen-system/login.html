<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Canteen</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><i class="fa-solid fa-utensils"></i> SmartCanteen</a>
                <button id="theme-btn" class="theme-toggle"><i class="fa-regular fa-moon"></i></button>
            </nav>
        </div>
    </header>

    <main class="login-container">
        <div class="card login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" value="demouser" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" value="password123" required>
                </div>
                <div class="form-group">
                    <label for="role">Select Role</label>
                    <select id="role" class="form-control" required>
                        <option value="student">Student</option>
                        <option value="admin">Admin</option>
                        <option value="kitchen">Kitchen Staff</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
